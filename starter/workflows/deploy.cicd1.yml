name: Ship It
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# The ship app lives in launchpad/ in the learner fork; run every step there.
defaults:
  run:
    working-directory: launchpad

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: launchpad/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_CALLSIGN: ${{ github.actor }}   # your callsign = your GitHub username
      - uses: actions/upload-pages-artifact@v3
        with:
          path: launchpad/dist
      - id: deploy
        uses: actions/deploy-pages@v4
